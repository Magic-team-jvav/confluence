permissions: 
  contents: write
name: Nightly Build
on:
  workflow_dispatch:
  schedule:
    # Run this job every day at 5:30 AM UTC+8
    - cron: "30 21 * * *"

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/heads/neoforge-dev/1.21.1
          submodules: recursive
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 21
          cache: "gradle"
      - name: Generate assets
        run: |
          git submodule foreach '../gradlew runData'
          cd ./ConfluenceOtherworld && ./gradlew runData
      - name: Build Confluence
        working-directory: ./ConfluenceOtherworld
        run: ./gradlew build
      
      - name: Get version with date suffix
        id: version
        working-directory: ./ConfluenceOtherworld
        run: |
          if [ -f "gradle.properties" ]; then
            BASE_VERSION=$(grep -E "^(mod_)?version" gradle.properties | head -1 | cut -d'=' -f2 | tr -d ' \r\n' | sed 's/-.*//')
          elif [ -f "build.gradle" ]; then
            BASE_VERSION=$(grep -E "version.*=.*['\"].*['\"]" build.gradle | head -1 | sed -E "s/.*['\"]([^'\"]+)['\"].*/\1/" | sed 's/-.*//')
          else
            BASE_VERSION="1.2.0"
          fi
          DATE_SUFFIX=$(date +%y%m%d)
          FULL_VERSION="${BASE_VERSION}-alpha-${DATE_SUFFIX}"
          
          echo "BASE_VERSION=$BASE_VERSION" >> $GITHUB_OUTPUT
          echo "FULL_VERSION=$FULL_VERSION" >> $GITHUB_OUTPUT
          echo "Base version: $BASE_VERSION"
          echo "Full version with date: $FULL_VERSION"
      
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.FULL_VERSION }}
          release_name: Confluence Automate Build
          body: |
            **Pre-release**
            
            Automated nightly build
            - Version: ${{ steps.version.outputs.FULL_VERSION }}
            - Base Version: ${{ steps.version.outputs.BASE_VERSION }}
            - Build Number: ${{ github.run_number }}
            - Triggered by: ${{ github.event_name }}
            - Commit: ${{ github.sha }}
          draft: false
          prerelease: true
      
      - name: Upload all JAR files to Release
        run: |
          cd ./ConfluenceOtherworld/build/libs
          echo "Found JAR files:"
          ls -la *.jar
          
          for jar_file in *.jar; do
            echo "=== Uploading $jar_file ==="
            response=$(curl -w "\n%{http_code}" -s -X POST \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Content-Type: application/java-archive" \
              --data-binary @"$jar_file" \
              "${{ steps.create_release.outputs.upload_url }}?name=$jar_file")
            
            http_code=$(echo "$response" | tail -n1)
            response_body=$(echo "$response" | head -n -1)
            
            if [ "$http_code" = "201" ]; then
              echo "✅ Successfully uploaded $jar_file"
            else
              echo "❌ Failed to upload $jar_file (HTTP $http_code)"
              echo "Response: $response_body"
            fi
          done
