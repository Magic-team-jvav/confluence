version = mod_version
group = mod_group_id
base.archivesName = mod_id

neoForge {
    validateAccessTransformers = true

    accessTransformers = project.files('src/main/resources/META-INF/accesstransformer.cfg')

    // Default run configurations.
    // These can be tweaked, removed, or duplicated as needed.
    runs {
        data {
            data()

            // example of overriding the workingDirectory set in configureEach above, uncomment if you want to use it
            // gameDirectory = project.file('run-data')
            // Specify the modid for data generation, where to output the resulting resource, and where to look for existing resources.
            programArguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
        }
    }

    mods {
        // define mod <-> source bindings
        // these are used to tell the game which sources are for which mod
        // mostly optional in a single mod project
        // but multi mod projects should define one per mod
        "${mod_id}" {
            sourceSet(sourceSets.main)
        }
    }
}

// Include resources generated by data generators.
sourceSets.main.resources { srcDir 'src/generated/resources' }

boolean dev = project.hasProperty('dev')
        ? project.property('dev').toBoolean()
        : true  // If using this mod individually, please set false
// Default true. When -Pdev=false, it's for release build.
// Or if using this mod individually, please use ./gradlew build -Pdev=false

configurations {
    libraries
    // This way, you only need one dependency declaration for both runtime and compile dependencies
    implementation.extendsFrom libraries
    runtimeClasspath.extendsFrom localRuntime
}

dependencies {
    // lombok
//    compileOnly "org.projectlombok:lombok:1.18.30"
//    annotationProcessor "org.projectlombok:lombok:1.18.30"

    if (dev) {
        implementation project(":Confluence-Magic-Lib")
        implementation "software.bernie.geckolib:geckolib-neoforge-${minecraft_version}:${geckolib_version}"
        implementation "org.mesdag:ParticleStorm:${particle_storm_version}"
        implementation "org.mesdag.thr_dim_particle:ThreeDimensionParticle-core:${thr_dim_particle_version}"
    } else {
        implementation jarJar("org.confluence.lib:Confluence-Magic-Lib:${confluence_lib_version}")
        implementation jarJar("software.bernie.geckolib:geckolib-neoforge-${minecraft_version}:${geckolib_version}")
        implementation jarJar("org.mesdag:ParticleStorm:${particle_storm_version}")
        implementation jarJar("org.mesdag.thr_dim_particle:ThreeDimensionParticle-core:${thr_dim_particle_version}")
    }

    compileOnly "curse.maven:jade-324717:6011258"
    runtimeOnly "curse.maven:jade-324717:6011258"

    compileOnly "mezz.jei:jei-${minecraft_version}-common-api:${jei_version}"
    compileOnly "mezz.jei:jei-${minecraft_version}-neoforge-api:${jei_version}"
    runtimeOnly "mezz.jei:jei-${minecraft_version}-neoforge:${jei_version}"

    // 数学库
    implementation group: 'org.apache.commons', name: 'commons-math3', version: '3.6.1'
    jarJar(group: 'org.apache.commons', name: 'commons-math3', version: '3.6.1')
    additionalRuntimeClasspath "org.apache.commons:commons-math3:3.6.1"

    // 密码库
//    implementation (files("libs/vigsecurity-1.0.0.21.jar"))
//    jarJar(files("libs/vigsecurity-1.0.0.21.jar"))
//    additionalRuntimeClasspath "com.github.edg_thexu:vigsecurity:1.0.0.21"

    // 女仆
    compileOnly "curse.maven:touhou-little-maid-355044:6613831-sources-6613865"
    //runtimeOnly "curse.maven:touhou-little-maid-355044:6613831-sources-6613865"

    // jer
    runtimeOnly "curse.maven:just-enough-resources-jer-240630:6506298"
//    runtimeOnly "maven.modrinth:advanced-loot-info:FL8Q077t"

    // 暮色森林
    compileOnly "curse.maven:the-twilight-forest-227639:6087105"
    runtimeOnly "curse.maven:the-twilight-forest-227639:6087105"

    compileOnly "curse.maven:sodium-394468:6382651"
    compileOnly "curse.maven:irisshaders-455508:6661598"
    if (true) {
        runtimeOnly "curse.maven:sodium-394468:6382651"
        runtimeOnly "curse.maven:irisshaders-455508:6661598"
    }

    compileOnly "curse.maven:dynamiclights-reforged-551736:5807536"
    runtimeOnly "curse.maven:dynamiclights-reforged-551736:5807536"

    compileOnly "net.fabricmc.fabric-api:fabric-renderer-api-v1:6.0.2+75fa737a29"

    // 兼容azurelib读geo文件
//    runtimeOnly "maven.modrinth:azurelib:u50RGlc4" // 3.1.3

    // 联动curios
    compileOnly "top.theillusivec4.curios:curios-neoforge:${curios_version}"
    runtimeOnly "top.theillusivec4.curios:curios-neoforge:${curios_version}"

    // 联动铁魔法
    compileOnly "io.redspace:irons_spellbooks:${irons_spells_version}:api"
    compileOnly "io.redspace:irons_spellbooks:${irons_spells_version}"
    if (false) {
        runtimeOnly "io.redspace:irons_spellbooks:${irons_spells_version}"
        runtimeOnly "dev.kosmx.player-anim:player-animation-lib-forge:${player_animator_version}"
    }

    // 联动泰拉饰品
    compileOnly "curse.maven:terra-curio-1027625:6881159"
    runtimeOnly "curse.maven:terra-curio-1027625:6881159"

    // 彩色光源
    compileOnly("foundry.veil:veil-neoforge-${project.minecraft_version}:${project.veil_version}") {
        exclude group: "maven.modrinth"
        exclude group: "me.fallenbreath"
    }
//    runtimeOnly("foundry.veil:veil-neoforge-${project.minecraft_version}:${project.veil_version}") {
//        exclude group: "maven.modrinth"
//        exclude group: "me.fallenbreath"
//    }

}

// This block of code expands all declared replace properties in the specified resource targets.
// A missing property will result in an error. Properties are expanded using ${} Groovy notation.
// When "copyIdeResources" is enabled, this will also run before the game launches in IDE environments.
// See https://docs.gradle.org/current/dsl/org.gradle.language.jvm.tasks.ProcessResources.html
tasks.withType(ProcessResources).configureEach {
    var replaceProperties = [minecraft_version      : minecraft_version,
                             minecraft_version_range: minecraft_version_range,
                             neo_version            : neo_version,
                             neo_version_range      : neo_version_range,
                             loader_version_range   : loader_version_range,
                             mod_id                 : mod_id,
                             mod_name               : mod_name,
                             mod_license            : mod_license,
                             mod_version            : mod_version,
                             mod_authors            : mod_authors,
                             mod_description        : mod_description]
    inputs.properties replaceProperties

    filesMatching(['META-INF/neoforge.mods.toml']) {
        expand replaceProperties
    }
}

tasks.withType(Copy).configureEach { duplicatesStrategy = DuplicatesStrategy.EXCLUDE }


tasks.register("genVoilaRun") {
    dependsOn("prepareClientRun")
    inputs.files(sourceSets.main.output)
    inputs.files(configurations.runtimeClasspath)
    def runtimeClasspath = files({
        sourceSets.main.output + configurations.runtimeClasspath
    })
    def projectDir = project.projectDir
    def runConfigDir = new File(project.rootDir, ".idea/runConfigurations")
    def programParam = new File(projectDir, "build/moddev/clientRunProgramArgs.txt").toString().replace("\\", "\\\\")
    def workingDir = new File(projectDir, "run")
    def vmArgs = new File(projectDir, "build/moddev/clientRunVmArgs.txt").toString().replace("\\", "\\\\")
    def moduleName = "${project.rootProject.name}.${project.name}.${sourceSets.main.name}"
    // 写死了自身必定在第二层
    def classesDir = new File(projectDir, "build/classes/java/main").toString().replace("\\", "\\\\")
    def resDir = new File(projectDir, "build/resources/main").toString().replace("\\", "\\\\")
    def modId = mod_id
    def ideaRt = "D:\\Program Files\\JetBrains\\IntelliJ IDEA 2024.2.3\\lib\\idea_rt.jar"
//    return;

    def runConfig = """
            <component name="ProjectRunConfigurationManager">
                <configuration default="false" name="Confluence" type="SpringBootApplicationConfigurationType" factoryName="Spring Boot" nameIsGenerated="false">
                    <option name="MAIN_CLASS_NAME" value="net.neoforged.devlaunch.Main" />
                    <option name="SPRING_BOOT_MAIN_CLASS" value="net.neoforged.devlaunch.Main" />
                    <module name="${moduleName}" />
                    <option name="VM_PARAMETERS" value="@${vmArgs} -Dfml.modFolders=${modId}%%${classesDir};${modId}%%${resDir} -cp &quot;${runtimeClasspath.asPath};${ideaRt}&quot;" />
                    <option name="PROGRAM_PARAMETERS" value="@${programParam}" />
                    <option name="WORKING_DIRECTORY" value="${workingDir}" />
                    <method v="2">
                        <option name="Make" enabled="true" />
                    </method>
                </configuration>
            </component>"""
    if (!runConfigDir.exists()) {
        runConfigDir.mkdirs()
    }
    new File(runConfigDir, "GeneratedRunConfig.xml").text = runConfig
}

tasks.register('buildRelease', Exec) {
    group = "build"
    description = "Builds a release version of the mod"
    commandLine 'cmd', '/c', 'gradlew.bat build -Pdev=false'
}