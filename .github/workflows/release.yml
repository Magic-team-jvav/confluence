name: Release Publish
on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/heads/neoforge-dev/1.21.1
          submodules: recursive
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 21

      - name: Cache Gradle & Minecraft Data
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ./ConfluenceOtherworld/.gradle/
            **/build/generated/
          key: ${{ runner.os }}-gradle-neo-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-neo-

      - name: Grant execute permissions
        run: find . -name "gradlew" -exec chmod +x {} +

      - name: Execute Integrated Build
        working-directory: ./ConfluenceOtherworld
        env:
          GRADLE_OPTS: >-
            -Xmx5g
            -Dorg.gradle.parallel=true
            -Dorg.gradle.vfs.watch=true
            -Dorg.gradle.daemon=true
            -Dorg.gradle.caching=true
          MAGIC_TEAM_USERNAME: ${{ secrets.MAGIC_TEAM_USERNAME }}
          MAGIC_TEAM_TOKEN: ${{ secrets.MAGIC_TEAM_TOKEN }}
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./gradlew runData build publish publishMod \
            --build-cache \
            --stacktrace \
            -Dorg.gradle.terminal.width=80

      - name: Upload Build Artifacts (Optional)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Confluence-Build-Jars
          path: ./ConfluenceOtherworld/build/libs/*.jar