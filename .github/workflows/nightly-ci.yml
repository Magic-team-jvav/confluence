permissions: 
  contents: write
name: Nightly Build
on:
  workflow_dispatch:
  schedule:
    # Run this job every day at 5:30 AM UTC+8
    - cron: "30 21 * * *"

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/heads/neoforge-dev/1.21.1
          submodules: recursive
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 21
          cache: "gradle"
      - name: Generate assets
        run: |
          git submodule foreach '../gradlew runData'
          cd ./ConfluenceOtherworld && ./gradlew runData
      - name: Build Confluence
        working-directory: ./ConfluenceOtherworld
        run: ./gradlew build
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: nightly-${{ github.run_id }}
          release_name: Nightly Build ${{ github.run_id }}
          body: |
            Automated nightly build
            - Build Number: ${{ github.run_number }}
            - Triggered by: ${{ github.event_name }}
            - Commit: ${{ github.sha }}
          draft: false
          prerelease: true
      - name: Upload all JAR files to Release
        run: |
          cd ./ConfluenceOtherworld/build/libs
          for jar_file in *.jar; do
            echo "Uploading $jar_file"
            curl -s -X POST \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Content-Type: application/java-archive" \
              --data-binary @"$jar_file" \
              "${{ steps.create_release.outputs.upload_url }}?name=$jar_file"
            echo " - Upload completed for $jar_file"
          done
