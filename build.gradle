plugins {
    id 'java-library'
    id 'eclipse'
    id 'idea'
    id 'maven-publish'
    id 'net.neoforged.moddev.legacyforge' version '2.0.141' apply false
}

java.toolchain.languageVersion = JavaLanguageVersion.of(17)

idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}
