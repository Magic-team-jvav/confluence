pluginManagement {
    repositories {
        mavenLocal()
        gradlePluginPortal()
        maven { url = 'https://maven.neoforged.net/releases' }
    }
}

plugins {
    id 'org.gradle.toolchains.foojay-resolver-convention' version '0.8.0'
}


include ":ConfluenceOtherworld"

var projectName = ["Confluence-Magic-Lib", "TerraEntity", "MineTeam",
                   "TerraCurio", "HeavenDestinyMoment",
                   "TerraMoment", "TerraGuns", "IsekaiInvaded", "TerraFurniture",
                   "TheTrackers", "EnemyBanner"
]
projectName.forEach { name -> include ":" + name }

