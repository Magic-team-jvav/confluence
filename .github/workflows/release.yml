name: Release Publish
on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:

          ref: refs/heads/neoforge-dev/1.21.1
          submodules: recursive
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 21
          cache: "gradle"

      - name: Grant execute permissions
        run: chmod +x gradlew || find . -name "gradlew" -exec chmod +x {} +

      - name: Generate Assets (runData)
        working-directory: ./ConfluenceOtherworld
        run: |
          # 1. 运行子模块的数据生成（如果子模块有自己的 gradlew）
          git submodule foreach '[ -f ./gradlew ] && ./gradlew runData --no-configuration-cache || echo "No gradlew in submodule"'

          # 2. 运行主项目的数据生成
          ./gradlew runData --no-configuration-cache

      - name: Build & Publish
        working-directory: ./ConfluenceOtherworld
        run: |
          ./gradlew build publish publishMod \
            --no-configuration-cache \
            --stacktrace
        env:
          MAGIC_TEAM_USERNAME: ${{ secrets.MAGIC_TEAM_USERNAME }}
          MAGIC_TEAM_TOKEN: ${{ secrets.MAGIC_TEAM_TOKEN }}
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Build Artifacts (Optional)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Confluence-Build-Jars
          path: ./ConfluenceOtherworld/build/libs/*.jar