permissions: write-all
name: Nightly Build
on:
  workflow_dispatch:
  schedule:
    # Run this job every day at 5:30 AM UTC+8
    - cron: "30 21 * * *"

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/heads/neoforge-dev/1.21.1
          submodules: recursive
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 21
          cache: "gradle"
      - name: Generate assets
        run: |
          git submodule foreach '../gradlew runData'
          cd ./ConfluenceOtherworld && ./gradlew runData
      - name: Build Confluence
        working-directory: ./ConfluenceOtherworld
        run: ./gradlew build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Confluence Automate Build
          path: ./ConfluenceOtherworld/build/libs/*.jar
